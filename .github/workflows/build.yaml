name: build

on:
    pull_request:
    push:
        branches:
            - main
        tags:
            - "v*"
    workflow_dispatch:

permissions:
    contents: read
    packages: write
    id-token: write

env:
    IMAGE_NAME: ghcr.io/getarcaneapp/tools

jobs:
    validate:
        runs-on: ubuntu-latest
        steps:
            - name: Check out repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build validation image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  load: true
                  platforms: linux/amd64
                  tags: arcane-toolbox:ci

            - name: Validate runtime contract
              run: ./scripts/validate.sh arcane-toolbox:ci

    publish:
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        needs: validate
        runs-on: depot-ubuntu-latest
        steps:
            - name: Check out repository
              uses: actions/checkout@v6

            - name: Set up Depot CLI
              uses: depot/setup-action@v1

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Derive image metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.IMAGE_NAME }}
                  tags: |
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=semver,pattern={{major}}
                      type=sha

            - name: Build and publish image
              id: build
              uses: depot/build-push-action@v1
              with:
                  project: np622krb2x
                  context: .
                  file: ./Dockerfile
                  platforms: linux/amd64,linux/arm64
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}

            - name: Record published digest
              run: |
                  {
                    echo "Published image: ${{ env.IMAGE_NAME }}"
                    echo "Published digest: ${{ steps.build.outputs.digest }}"
                  } >> "$GITHUB_STEP_SUMMARY"
